<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>小风扇控制器</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f0f0f0;
            font-family: sans-serif;
        }
        .fan {
            width: 120px;
            height: 120px;
            position: relative;
            margin-bottom: 30px;
        }
        .blade {
            position: absolute;
            width: 50%;
            height: 4px;
            background: #333;
            top: 50%;
            left: 50%;
            transform-origin: left center;
            border-radius: 2px;
        }
        .blade:nth-child(1) { transform: rotate(0deg); }
        .blade:nth-child(2) { transform: rotate(60deg); }
        .blade:nth-child(3) { transform: rotate(120deg); }
        .blade:nth-child(4) { transform: rotate(180deg); }
        .blade:nth-child(5) { transform: rotate(240deg); }
        .blade:nth-child(6) { transform: rotate(300deg); }
        .center {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #555;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }
        .spin {
            animation: spin 0.3s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .controls button {
            margin: 0 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #2196F3;
            color: #fff;
        }
        .controls button:hover {
            background: #1976D2;
        }
        .timer {
            margin-top: 15px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="fan" id="fan">
        <div class="blade"></div>
        <div class="blade"></div>
        <div class="blade"></div>
        <div class="blade"></div>
        <div class="blade"></div>
        <div class="blade"></div>
        <div class="center"></div>
    </div>
    <div class="controls">
        <button onclick="startFan()">Turn On</button>
        <button onclick="stopFan()">Turn Off</button>
        <button onclick="scheduleStop()">定时关闭（10秒）</button>
    </div>
    <div class="timer" id="timer"></div>

    <script>
        let countdownInterval;
        function startFan() {
            document.getElementById('fan').classList.add('spin');
        }
        function stopFan() {
            document.getElementById('fan').classList.remove('spin');
            clearInterval(countdownInterval);
            document.getElementById('timer').textContent = '';
        }
        function scheduleStop() {
            stopFan(); // 先停止之前的倒计时
            startFan(); // 确保风扇开启
            let timeLeft = 10;
            document.getElementById('timer').textContent = `倒计时: ${timeLeft}秒`;
            countdownInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = `倒计时: ${timeLeft}秒`;
                if (timeLeft <= 0) {
                    stopFan();
                    document.getElementById('timer').textContent = '已关闭';
                }
            }, 1000);
        }
    </script>
</body>
</html>
