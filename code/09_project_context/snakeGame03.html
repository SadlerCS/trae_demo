<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网页版贪吃蛇 | 原生 HTML/CSS/JS</title>
    <style>
      /* ========================= 全局与布局 ========================= */
      :root {
        --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji",
          "Segoe UI Emoji";
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: var(--font);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        transition: background 0.3s ease;
      }

      .app {
        width: 760px;
        max-width: 95vw;
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: center;
      }

      .hud {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        background: rgba(255,255,255,0.15);
        backdrop-filter: blur(6px);
        border-radius: 12px;
        padding: 10px 14px;
      }

      .hud .left, .hud .right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .score {
        display: flex;
        gap: 12px;
        font-weight: 600;
      }
      .score .val { min-width: 48px; display: inline-block; text-align: right; }

      .controls select, .controls button {
        appearance: none;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid rgba(0,0,0,0.15);
        background: rgba(255,255,255,0.75);
        cursor: pointer;
        font-weight: 600;
      }
      .controls button:hover { filter: brightness(1.05); }
      .controls button:active { transform: translateY(1px); }

      .board-wrap {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 10px 24px rgba(0,0,0,0.2);
      }
      canvas#board {
        display: block;
        background: transparent;
      }

      .legend {
        width: 100%;
        text-align: center;
        font-size: 13px;
        opacity: 0.85;
      }

      /* ========================= 主题背景（纯 CSS 渐变） ========================= */
      /* 森林主题 */
      .theme-forest {
        background: radial-gradient(1200px 600px at 20% 20%, #b8ffcc 0%, #6bd089 35%, #2f8f4e 100%);
      }
      /* 海洋主题 */
      .theme-ocean {
        background: radial-gradient(1200px 600px at 50% 30%, #bde8ff 0%, #6db6ff 40%, #1d5fbf 100%);
      }
      /* 日落主题 */
      .theme-sunset {
        background: radial-gradient(1200px 600px at 70% 10%, #ffd7b5 0%, #ff9b6b 40%, #d64e36 100%);
      }
      /* 夜幕主题 */
      .theme-night {
        background: radial-gradient(1200px 600px at 50% 0%, #2a2e35 0%, #1f2329 40%, #121417 100%);
        color: #e7edf3;
      }
    </style>
  </head>
  <body class="theme-forest">
    <div class="app">
      <div class="hud">
        <div class="left">
          <div class="score">
            <span>分数：</span><span id="score" class="val">0</span>
            <span>最高分：</span><span id="highScore" class="val">0</span>
          </div>
        </div>
        <div class="right controls">
          <label for="themeSelect">背景：</label>
          <select id="themeSelect">
            <option value="forest">森林</option>
            <option value="ocean">海洋</option>
            <option value="sunset">日落</option>
            <option value="night">夜幕</option>
          </select>
          <button id="btnToggle">开始</button>
          <button id="btnReset">重开</button>
        </div>
      </div>

      <div class="board-wrap">
        <canvas id="board" width="480" height="480"></canvas>
      </div>

      <div class="legend">
        方向键/WASD 移动 · 空格 暂停/继续 · R 重开 · 1–4 切换主题
      </div>
    </div>

    <script>
      // ========================= 基础常量与状态 =========================
      // 画布与网格配置（可根据需要微调大小）
      const CELL_SIZE = 20;      // 每个格子的像素大小
      const GRID_COLS = 24;      // 网格列数
      const GRID_ROWS = 24;      // 网格行数
      const WIDTH = GRID_COLS * CELL_SIZE;
      const HEIGHT = GRID_ROWS * CELL_SIZE;

      // 速度与计分设置
      const BASE_SPEED = 6;      // 基础速度：每秒格数
      const MAX_SPEED = 12;      // 最高速度：每秒格数
      const POINTS_PER_FOOD = 10;// 每枚食物加分

      // 本地存储键名（最高分）
      const STORAGE_KEY_HISCORE = 'snake_high_score_v1';

      // 主题配色方案（蛇头、蛇身、食物、网格线）
      const THEMES = {
        forest: {
          bodyClass: 'theme-forest',
          snakeHead: '#1a5c34',
          snakeBody: '#2f8f4e',
          food: '#ffdd57',
          grid: 'rgba(255,255,255,0.25)'
        },
        ocean: {
          bodyClass: 'theme-ocean',
          snakeHead: '#0f4a8a',
          snakeBody: '#1d5fbf',
          food: '#ffeb99',
          grid: 'rgba(255,255,255,0.35)'
        },
        sunset: {
          bodyClass: 'theme-sunset',
          snakeHead: '#8a2f1f',
          snakeBody: '#d64e36',
          food: '#ffe08a',
          grid: 'rgba(0,0,0,0.25)'
        },
        night: {
          bodyClass: 'theme-night',
          snakeHead: '#e3e8ef',
          snakeBody: '#aab4be',
          food: '#8bd54f',
          grid: 'rgba(255,255,255,0.15)'
        }
      };

      // 获取 DOM 引用
      const canvas = document.getElementById('board');
      const ctx = canvas.getContext('2d');
      const scoreEl = document.getElementById('score');
      const highScoreEl = document.getElementById('highScore');
      const themeSelect = document.getElementById('themeSelect');
      const btnToggle = document.getElementById('btnToggle');
      const btnReset = document.getElementById('btnReset');

      // 设置画布尺寸与像素对齐
      canvas.width = WIDTH;
      canvas.height = HEIGHT;

      // 当前主题配色
      let palette = THEMES.forest;

      // 游戏状态与数据结构
      let running = false;      // 是否正在运行
      let gameover = false;     // 是否已结束
      let score = 0;            // 当前分数
      let highScore = 0;        // 最高分
      let speed = BASE_SPEED;   // 当前速度（格/秒）
      let accMs = 0;            // 帧时间累加（毫秒）
      let lastTs = 0;           // 上一帧时间戳

      // 蛇体与方向管理
      /**
       * 蛇由一系列网格坐标段组成（数组首端为蛇头）
       * 方向队列用于避免同一帧内多次改变方向，以及禁止 180° 反向
       */
      let snake = [];
      let dir = { x: 1, y: 0 }; // 初始向右
      let dirQueue = [];         // 待应用的方向队列

      // 食物位置
      let food = { x: 10, y: 10 };

      // ========================= 工具与初始化 =========================
      function randInt(min, max) { // [min, max]
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function samePos(a, b) {
        return a.x === b.x && a.y === b.y;
      }

      function resetGame() {
        // 重置状态
        running = false;
        gameover = false;
        score = 0;
        speed = BASE_SPEED;
        accMs = 0;
        lastTs = 0;
        dir = { x: 1, y: 0 };
        dirQueue = [];

        // 初始化蛇体：居中，长度 3
        const startX = Math.floor(GRID_COLS / 2);
        const startY = Math.floor(GRID_ROWS / 2);
        snake = [
          { x: startX, y: startY },
          { x: startX - 1, y: startY },
          { x: startX - 2, y: startY }
        ];

        placeFood();
        updateScoreUI();
        draw();
      }

      function updateScoreUI() {
        scoreEl.textContent = String(score);
        highScoreEl.textContent = String(highScore);
      }

      function loadHighScore() {
        const raw = localStorage.getItem(STORAGE_KEY_HISCORE);
        highScore = raw ? parseInt(raw, 10) || 0 : 0;
      }

      function saveHighScore() {
        if (score > highScore) {
          highScore = score;
          localStorage.setItem(STORAGE_KEY_HISCORE, String(highScore));
        }
      }

      function placeFood() {
        // 随机生成一个不与蛇重叠的格子作为食物位置
        const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
        // 如果网格几近满员，落回逐一扫描
        if (occupied.size >= GRID_COLS * GRID_ROWS - 1) {
          for (let y = 0; y < GRID_ROWS; y++) {
            for (let x = 0; x < GRID_COLS; x++) {
              const k = `${x},${y}`;
              if (!occupied.has(k)) {
                food = { x, y };
                return;
              }
            }
          }
        }
        // 常规随机尝试（限定尝试次数，避免极端情况死循环）
        for (let tries = 0; tries < 200; tries++) {
          const x = randInt(0, GRID_COLS - 1);
          const y = randInt(0, GRID_ROWS - 1);
          const k = `${x},${y}`;
          if (!occupied.has(k)) {
            food = { x, y };
            return;
          }
        }
        // 兜底：线性扫描第一个空位
        for (let y = 0; y < GRID_ROWS; y++) {
          for (let x = 0; x < GRID_COLS; x++) {
            const k = `${x},${y}`;
            if (!occupied.has(k)) { food = { x, y }; return; }
          }
        }
      }

      // ========================= 方向与输入 =========================
      function pushDirection(nx, ny) {
        const last = dirQueue.length ? dirQueue[dirQueue.length - 1] : dir;
        // 禁止 180° 反向
        if (last.x + nx === 0 && last.y + ny === 0) return;
        dirQueue.push({ x: nx, y: ny });
      }

      function applyNextDirection() {
        if (dirQueue.length) {
          const next = dirQueue.shift();
          // 再次检查避免极端情况下反向
          if (!(dir.x + next.x === 0 && dir.y + next.y === 0)) {
            dir = next;
          }
        }
      }

      // 键盘事件：方向/暂停/重开/主题快捷键
      window.addEventListener('keydown', (e) => {
        const k = e.key.toLowerCase();
        if (k === 'arrowup' || k === 'w') pushDirection(0, -1);
        else if (k === 'arrowdown' || k === 's') pushDirection(0, 1);
        else if (k === 'arrowleft' || k === 'a') pushDirection(-1, 0);
        else if (k === 'arrowright' || k === 'd') pushDirection(1, 0);
        else if (k === ' ') toggleRun();
        else if (k === 'r') restart();
        else if (k === '1') setTheme('forest');
        else if (k === '2') setTheme('ocean');
        else if (k === '3') setTheme('sunset');
        else if (k === '4') setTheme('night');
      });

      // ========================= 主循环与更新 =========================
      function loop(ts) {
        if (!lastTs) lastTs = ts;
        const dt = ts - lastTs; // 本帧与上一帧时间差（ms）
        lastTs = ts;

        if (running && !gameover) {
          accMs += dt;
          const stepMs = 1000 / speed; // 单步移动所需毫秒
          while (accMs >= stepMs) {
            accMs -= stepMs;
            step();
          }
        }

        draw();
        requestAnimationFrame(loop);
      }

      function step() {
        applyNextDirection();

        // 计算新蛇头位置
        const head = snake[0];
        const newHead = { x: head.x + dir.x, y: head.y + dir.y };

        // 边界碰撞判断
        if (
          newHead.x < 0 || newHead.x >= GRID_COLS ||
          newHead.y < 0 || newHead.y >= GRID_ROWS
        ) {
          doGameOver();
          return;
        }

        // 身体自撞判断（新头是否与身体重叠）
        for (let i = 0; i < snake.length; i++) {
          if (samePos(newHead, snake[i])) { doGameOver(); return; }
        }

        // 将新头插入数组前端
        snake.unshift(newHead);

        // 判断是否吃到食物：若是则加分并增长，否则移除尾巴
        if (samePos(newHead, food)) {
          score += POINTS_PER_FOOD;
          saveHighScore();
          // 随分数略微提升速度（有上限）
          speed = Math.min(MAX_SPEED, BASE_SPEED + Math.floor(score / 50));
          placeFood();
          updateScoreUI();
        } else {
          snake.pop();
        }
      }

      function doGameOver() {
        gameover = true;
        running = false;
        btnToggle.textContent = '开始';
      }

      function toggleRun() {
        if (gameover) return; // 结束后不允许继续
        running = !running;
        btnToggle.textContent = running ? '暂停' : '开始';
      }

      function restart() {
        resetGame();
        running = true;
        btnToggle.textContent = '暂停';
      }

      // ========================= 绘制 =========================
      function clear() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
      }

      function drawGrid() {
        ctx.strokeStyle = palette.grid;
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let x = 0; x <= GRID_COLS; x++) {
          ctx.moveTo(x * CELL_SIZE + 0.5, 0);
          ctx.lineTo(x * CELL_SIZE + 0.5, HEIGHT);
        }
        for (let y = 0; y <= GRID_ROWS; y++) {
          ctx.moveTo(0, y * CELL_SIZE + 0.5);
          ctx.lineTo(WIDTH, y * CELL_SIZE + 0.5);
        }
        ctx.stroke();
      }

      function drawCell(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
      }

      function drawFood() {
        // 使用圆角方块效果，视觉更柔和
        const px = food.x * CELL_SIZE;
        const py = food.y * CELL_SIZE;
        const r = Math.floor(CELL_SIZE * 0.25);
        ctx.fillStyle = palette.food;
        roundRect(px + 2, py + 2, CELL_SIZE - 4, CELL_SIZE - 4, r);
        ctx.fill();
      }

      function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      function drawSnake() {
        for (let i = 0; i < snake.length; i++) {
          const seg = snake[i];
          const isHead = i === 0;
          const color = isHead ? palette.snakeHead : palette.snakeBody;
          drawCell(seg.x, seg.y, color);
        }
      }

      function draw() {
        clear();
        drawGrid();
        drawFood();
        drawSnake();
        if (gameover) {
          // 居中绘制结束提示
          const msg = '游戏结束 · R 重开';
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.fillRect(WIDTH / 2 - 120, HEIGHT / 2 - 24, 240, 48);
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 16px ' + getComputedStyle(document.body).fontFamily;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(msg, WIDTH / 2, HEIGHT / 2);
        }
      }

      // ========================= 主题切换 =========================
      function setTheme(name) {
        const t = THEMES[name] || THEMES.forest;
        palette = t;
        document.body.classList.remove('theme-forest','theme-ocean','theme-sunset','theme-night');
        document.body.classList.add(t.bodyClass);
        // 同步下拉选项
        themeSelect.value = name in THEMES ? name : 'forest';
        // 立刻重绘以应用网格与颜色
        draw();
      }

      // ========================= 事件绑定 =========================
      btnToggle.addEventListener('click', () => toggleRun());
      btnReset.addEventListener('click', () => restart());
      themeSelect.addEventListener('change', (e) => setTheme(e.target.value));

      // ========================= 初始化与启动 =========================
      loadHighScore();
      resetGame(); // 初始绘制
      // 默认不自动开始，点击“开始”或按空格启动
      requestAnimationFrame(loop);

    </script>
  </body>
  </html>
