<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>贪吃蛇（原生 HTML/CSS/JS）</title>
  <style>
    /* ========== 全局变量（CSS） ========== */
    :root{
      --card-bg: rgba(255,255,255,0.85);
      --text: #1f2937;
      --accent: #22c55e;
      --danger: #ef4444;
      --border: rgba(0,0,0,0.08);
    }

    /* ========== 背景主题（切换时给 body 添加类名） ========== */
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", "Noto Sans", "Helvetica Neue", Arial, "Noto Color Emoji", "Apple Color Emoji", sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.6s ease;
    }
    /* 经典淡雅渐变 */
    body.bg-classic{
      background: linear-gradient(120deg, #f0f5ff 0%, #eafff4 100%);
    }
    /* 网格纸风格 */
    body.bg-grid{
      background:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.9) 0 18px, rgba(240,240,240,0.9) 18px 20px),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.9) 0 18px, rgba(240,240,240,0.9) 18px 20px);
    }
    /* 霓虹流动渐变 */
    @keyframes neonShift{
      0%{ background-position: 0% 50%; }
      50%{ background-position: 100% 50%; }
      100%{ background-position: 0% 50%; }
    }
    body.bg-neon{
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      background-size: 200% 200%;
      animation: neonShift 14s ease infinite;
    }
    /* 暗色聚焦渐变 */
    body.bg-dark{
      background:
        radial-gradient(1000px 600px at 20% 10%, #1f1f2e 0%, #0b0b12 60%, #06060a 100%);
    }

    /* ========== 页面布局 ========== */
    .container{
      width: 760px;
      max-width: 96vw;
    }
    .panel{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }
    .brand{
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .score{
      font-weight: 700;
      color: var(--accent);
    }
    .controls{
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .select, .btn{
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      padding: 0 10px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    .btn{
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0 14px;
      cursor: pointer;
    }
    .btn:hover{ filter: brightness(1.05); }

    .canvas-wrap{
      margin-top: 14px;
      padding: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 16px 50px rgba(0,0,0,0.08);
    }
    canvas{
      display: block;
      width: 600px;   /* CSS 尺寸（可缩放显示），实际绘图以 width/height 属性为准 */
      height: 400px;
      background: #101316; /* 画布背景 */
      border-radius: 10px;
      image-rendering: pixelated; /* 让像素边缘更硬朗，符合复古像素风 */
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }
    .hint{
      margin-top: 8px;
      font-size: 13px;
      color: #667085;
    }
  </style>
</head>
<body class="bg-classic">
  <div class="container">
    <!-- 顶部信息与控制面板 -->
    <div class="panel">
      <div class="brand">贪吃蛇（原生版）</div>
      <div class="score">积分：<span id="score">0</span></div>
      <div class="controls">
        <label for="bgSelect">背景：</label>
        <select id="bgSelect" class="select" title="切换背景主题">
          <option value="classic">经典</option>
          <option value="grid">网格纸</option>
          <option value="neon">霓虹</option>
          <option value="dark">暗色</option>
        </select>
        <button id="resetBtn" class="btn">重置游戏</button>
      </div>
    </div>

    <!-- 画布区域 -->
    <div class="canvas-wrap">
      <!-- 设置实际像素尺寸，游戏以此为基准计算网格 -->
      <canvas id="game" width="600" height="400"></canvas>
      <div class="hint">方向键或 WASD 控制蛇移动；吃到食物加分；撞到边界或自己则游戏结束。</div>
    </div>
  </div>

  <script>
    /* ========== 游戏主逻辑（原生 JavaScript） ========== */

    // —— 基本配置（可根据需要调整）——
    const tileSize = 20;                 // 网格尺寸（每格像素大小）
    const width = 600, height = 400;     // 画布像素尺寸（需与 <canvas> 的 width/height 对齐）
    const cols = width / tileSize;       // 列数
    const rows = height / tileSize;      // 行数
    const initialLength = 4;             // 初始蛇身长度
    const tickMs = 120;                  // 刷新速度（毫秒/步）

    // —— 画布与上下文 —— 
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // —— UI 元素 —— 
    const scoreEl = document.getElementById('score');
    const bgSelect = document.getElementById('bgSelect');
    const resetBtn = document.getElementById('resetBtn');

    // —— 游戏状态变量 —— 
    let snake = [];                      // 蛇身坐标数组（头在数组首位）
    let dir = {x: 1, y: 0};              // 当前移动方向（单位：格）
    let nextDir = {x: 1, y: 0};          // 下一步方向（用于防止一帧内多次方向变更）
    let food = {x: 10, y: 10};           // 食物位置（格坐标）
    let score = 0;                       // 当前积分
    let gameTimer = null;                // 定时器句柄
    let isGameOver = false;              // 游戏结束标记

    // —— 初始化/重置游戏 —— 
    function resetGame(){
      score = 0;
      scoreEl.textContent = score;
      isGameOver = false;

      // 初始化蛇（居中，从左到右）
      snake = [];
      const startX = Math.floor(cols/2) - Math.floor(initialLength/2);
      const startY = Math.floor(rows/2);
      for(let i=0;i<initialLength;i++){
        snake.unshift({x: startX + i, y: startY});
      }
      dir = {x: 1, y: 0};
      nextDir = {x: 1, y: 0};

      // 放置食物
      placeFood();

      // 启动循环
      if(gameTimer) clearInterval(gameTimer);
      gameTimer = setInterval(tick, tickMs);

      // 立即绘制一次
      draw();
    }

    // —— 随机生成不与蛇重叠的食物 —— 
    function placeFood(){
      while(true){
        const x = Math.floor(Math.random()*cols);
        const y = Math.floor(Math.random()*rows);
        const conflict = snake.some(seg => seg.x===x && seg.y===y);
        if(!conflict){
          food = {x, y};
          return;
        }
      }
    }

    // —— 核心循环：更新 + 绘制 —— 
    function tick(){
      if(isGameOver) return;

      // 应用下一步方向（防止同一帧内反复变向）
      dir = nextDir;

      // 计算蛇头新位置
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

      // 边界碰撞检测（撞墙即结束）
      if(head.x < 0 || head.y < 0 || head.x >= cols || head.y >= rows){
        return gameOver();
      }

      // 身体碰撞检测（头撞到身体则结束）
      if(snake.some(seg => seg.x===head.x && seg.y===head.y)){
        return gameOver();
      }

      // 将新头插入数组首位
      snake.unshift(head);

      // 吃到食物：加分并生成新食物；否则移除尾巴保持长度
      if(head.x === food.x && head.y === food.y){
        score += 10;
        scoreEl.textContent = score;
        placeFood();
      }else{
        snake.pop();
      }

      // 绘制
      draw();
    }

    // —— 绘制画面 —— 
    function draw(){
      // 清屏
      ctx.clearRect(0, 0, width, height);

      // 绘制网格辅助（可选，提升辨识度）
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      for(let x=tileSize; x<width; x+=tileSize){
        ctx.beginPath();
        ctx.moveTo(x,0); ctx.lineTo(x,height);
        ctx.stroke();
      }
      for(let y=tileSize; y<height; y+=tileSize){
        ctx.beginPath();
        ctx.moveTo(0,y); ctx.lineTo(width,y);
        ctx.stroke();
      }

      // 绘制食物
      const foodPx = {x: food.x*tileSize, y: food.y*tileSize};
      ctx.fillStyle = '#e11d48'; // 食物用红色
      roundRect(ctx, foodPx.x+2, foodPx.y+2, tileSize-4, tileSize-4, 4, true);

      // 绘制蛇
      for(let i=0; i<snake.length; i++){
        const seg = snake[i];
        const px = {x: seg.x*tileSize, y: seg.y*tileSize};
        // 头部使用高亮色
        ctx.fillStyle = i===0 ? '#22c55e' : '#16a34a';
        roundRect(ctx, px.x+2, px.y+2, tileSize-4, tileSize-4, 4, true);
      }

      // 游戏结束覆盖提示（画在画布上）
      if(isGameOver){
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0,0,width,height);
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.font = 'bold 32px system-ui, sans-serif';
        ctx.fillText('游戏结束', width/2, height/2 - 12);
        ctx.font = '16px system-ui, sans-serif';
        ctx.fillText('按“重置游戏”按钮重新开始', width/2, height/2 + 18);
      }
    }

    // —— 工具：绘制圆角矩形 —— 
    function roundRect(ctx, x, y, w, h, r, fill){
      ctx.beginPath();
      ctx.moveTo(x+r, y);
      ctx.arcTo(x+w, y, x+w, y+h, r);
      ctx.arcTo(x+w, y+h, x, y+h, r);
      ctx.arcTo(x, y+h, x, y, r);
      ctx.arcTo(x, y, x+w, y, r);
      ctx.closePath();
      if(fill) ctx.fill();
    }

    // —— 游戏结束处理 —— 
    function gameOver(){
      isGameOver = true;
      if(gameTimer) clearInterval(gameTimer);
      draw(); // 绘制覆盖层文字
    }

    // —— 输入控制：方向键/WASD —— 
    window.addEventListener('keydown', (e)=>{
      const key = e.key.toLowerCase();
      let nd = null;
      if(key === 'arrowup' || key === 'w') nd = {x:0, y:-1};
      else if(key === 'arrowdown' || key === 's') nd = {x:0, y:1};
      else if(key === 'arrowleft' || key === 'a') nd = {x:-1, y:0};
      else if(key === 'arrowright' || key === 'd') nd = {x:1, y:0};

      // 防止“瞬间掉头”（不允许直接反向）
      if(nd){
        const isOpposite = (nd.x === -dir.x && nd.y === -dir.y);
        if(!isOpposite){
          nextDir = nd;
        }
        e.preventDefault();
      }
    });

    // —— 背景切换 —— 
    bgSelect.addEventListener('change', ()=>{
      setBackground(bgSelect.value);
    });
    function setBackground(theme){
      // 根据选择给 body 切换类名
      document.body.classList.remove('bg-classic','bg-grid','bg-neon','bg-dark');
      const map = {
        classic: 'bg-classic',
        grid: 'bg-grid',
        neon: 'bg-neon',
        dark: 'bg-dark'
      };
      document.body.classList.add(map[theme] || 'bg-classic');
    }

    // —— 重置按钮 —— 
    resetBtn.addEventListener('click', resetGame);

    // —— 启动游戏（页面加载后自动开始） —— 
    setBackground(bgSelect.value);
    resetGame();
  </script>
</body>
</html>
