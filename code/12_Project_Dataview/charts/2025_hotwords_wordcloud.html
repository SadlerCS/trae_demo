<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025热词词云图</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2/dist/echarts-wordcloud.min.js"></script>
<style>
  html, body { height: 100%; margin: 0; }
  body { background: radial-gradient(1200px 600px at 30% 20%, #061727 0%, #030711 60%, #000000 100%); position: relative; }
  body::before {
    content: "";
    position: fixed;
    left: 0; top: 0; width: 100%; height: 100%;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 12px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 12px);
    transform: translateY(0);
    animation: scan 8s linear infinite;
    pointer-events: none;
  }
  @keyframes scan { 0% { transform: translateY(0);} 100% { transform: translateY(-12px);} }
  #chart { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="chart"></div>

</body>
</html>
