<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇大冒险 - 网页版</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 页面容器样式 */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #2c3e50;
            transition: background 0.5s ease;
            color: white;
        }

        /* 各种背景主题 */
        body.theme-classic { background-color: #2c3e50; }
        body.theme-grass { background-color: #27ae60; background-image: radial-gradient(#2ecc71 0.5px, transparent 0.5px); background-size: 20px 20px; }
        body.theme-space { background-color: #1a1a2e; background-image: radial-gradient(white 0.5px, transparent 0.5px); background-size: 40px 40px; }
        body.theme-sunset { background-color: #e67e22; background-image: linear-gradient(to bottom, #d35400, #e67e22); }

        /* 游戏区域容器 */
        .game-container {
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* 游戏画布 */
        canvas {
            display: block;
            background-color: #000;
            border: 4px solid #ecf0f1;
            border-radius: 5px;
            margin: 20px 0;
        }

        /* 控制面板样式 */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }

        /* 积分显示 */
        .score-board {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f1c40f;
        }

        /* 背景切换按钮组 */
        .theme-selector {
            display: flex;
            gap: 10px;
        }

        .theme-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .theme-btn:hover { transform: scale(1.2); }
        .btn-classic { background-color: #2c3e50; }
        .btn-grass { background-color: #27ae60; }
        .btn-space { background-color: #1a1a2e; }
        .btn-sunset { background-color: #e67e22; }

        /* 游戏提示信息 */
        .info {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #bdc3c7;
        }

        /* 游戏结束弹窗 */
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 10;
        }

        #game-over h2 { margin-bottom: 15px; color: #e74c3c; }
        
        button#restart-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 15px;
        }

        button#restart-btn:hover { background-color: #2980b9; }
    </style>
</head>
<body class="theme-classic">

    <div class="game-container">
        <h1>🐍 贪吃蛇大冒险 🍎</h1>
        
        <!-- 游戏控制栏 -->
        <div class="controls">
            <div class="score-board">得分: <span id="score">0</span></div>
            <div class="theme-selector">
                <div class="theme-btn btn-classic" onclick="setTheme('classic')" title="经典蓝"></div>
                <div class="theme-btn btn-grass" onclick="setTheme('grass')" title="青青草原"></div>
                <div class="theme-btn btn-space" onclick="setTheme('space')" title="浩瀚星空"></div>
                <div class="theme-btn btn-sunset" onclick="setTheme('sunset')" title="落日余晖"></div>
            </div>
        </div>

        <!-- 游戏画布 -->
        <canvas id="snakeGame" width="400" height="400"></canvas>

        <!-- 游戏提示 -->
        <div class="info">使用方向键 (↑ ↓ ← →) 或 WASD 控制移动</div>

        <!-- 游戏结束提示 -->
        <div id="game-over">
            <h2>游戏结束!</h2>
            <p>最终得分: <span id="final-score">0</span></p>
            <button id="restart-btn" onclick="resetGame()">重新开始</button>
        </div>
    </div>

    <script>
        /**
         * 贪吃蛇游戏逻辑实现
         */
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const finalScoreElement = document.getElementById("final-score");
        const gameOverDiv = document.getElementById("game-over");

        // 游戏参数配置
        const box = 20; // 每一个格子的像素大小
        let score = 0;
        let gameSpeed = 100; // 刷新频率(ms)
        let gameLoop;

        // 初始化蛇：位于中间，由三个节点组成
        let snake = [
            { x: 9 * box, y: 10 * box },
            { x: 8 * box, y: 10 * box },
            { x: 7 * box, y: 10 * box }
        ];

        // 初始化食物位置
        let food = getRandomFoodPosition();

        // 控制方向变量
        let d;

        // 监听键盘事件
        document.addEventListener("keydown", direction);

        /**
         * 键盘控制函数
         * @param {Event} event 
         */
        function direction(event) {
            let key = event.keyCode;
            // 37: 左, 38: 上, 39: 右, 40: 下
            // A: 65, W: 87, D: 68, S: 83
            if ((key == 37 || key == 65) && d != "RIGHT") {
                d = "LEFT";
            } else if ((key == 38 || key == 87) && d != "DOWN") {
                d = "UP";
            } else if ((key == 39 || key == 68) && d != "LEFT") {
                d = "RIGHT";
            } else if ((key == 40 || key == 83) && d != "UP") {
                d = "DOWN";
            }
        }

        /**
         * 生成随机食物位置
         */
        function getRandomFoodPosition() {
            return {
                x: Math.floor(Math.random() * 19 + 1) * box,
                y: Math.floor(Math.random() * 19 + 1) * box
            };
        }

        /**
         * 检查碰撞（蛇头是否碰到身体）
         */
        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) {
                    return true;
                }
            }
            return false;
        }

        /**
         * 切换主题背景
         */
        function setTheme(theme) {
            document.body.className = 'theme-' + theme;
        }

        /**
         * 游戏主循环绘制函数
         */
        function draw() {
            // 清空画布
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制蛇身
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#2ecc71" : "#ecf0f1"; // 蛇头为绿色，身体为白色
                ctx.strokeStyle = "#2c3e50";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // 绘制食物
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x, food.y, box, box);

            // 获取旧的蛇头位置
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            // 根据方向移动蛇头
            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            // 检查蛇是否吃到了食物
            if (snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                food = getRandomFoodPosition();
                // 吃到食物时不移除尾部，蛇变长
            } else {
                // 移除尾部
                snake.pop();
            }

            // 新的蛇头位置
            let newHead = {
                x: snakeX,
                y: snakeY
            };

            // 游戏结束条件：碰到墙壁或碰到自己
            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(gameLoop);
                endGame();
                return;
            }

            // 将新头插入蛇身数组首位
            snake.unshift(newHead);
        }

        /**
         * 游戏结束处理
         */
        function endGame() {
            finalScoreElement.innerText = score;
            gameOverDiv.style.display = "block";
        }

        /**
         * 重置并重新开始游戏
         */
        function resetGame() {
            score = 0;
            scoreElement.innerHTML = score;
            d = undefined;
            snake = [
                { x: 9 * box, y: 10 * box },
                { x: 8 * box, y: 10 * box },
                { x: 7 * box, y: 10 * box }
            ];
            food = getRandomFoodPosition();
            gameOverDiv.style.display = "none";
            clearInterval(gameLoop);
            gameLoop = setInterval(draw, gameSpeed);
        }

        // 启动游戏
        gameLoop = setInterval(draw, gameSpeed);
    </script>
</body>
</html>
