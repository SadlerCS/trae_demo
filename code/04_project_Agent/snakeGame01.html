<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>网页版贪吃蛇 SnakeGame01</title>
  <style>
    /* ========= 页面基础样式（含中文注释） ========= */
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: #0e1217; /* 整体页面深色背景，突出游戏区域 */
      color: #e6edf3;
    }
    .page {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* 游戏外层包裹容器，用于切换背景主题 */
    .game-wrapper {
      width: 560px;          /* 宽度 = 画布宽度(500) + 边距等空间 */
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
      transition: background 0.4s ease;
    }

    /* 顶部工具栏：分数、背景选择、控制按钮 */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .scoreboard {
      display: flex;
      gap: 16px;
      align-items: baseline;
    }
    .scoreboard .score {
      font-weight: 700;
      font-size: 20px;
    }
    .scoreboard .best {
      opacity: 0.8;
    }
    .controls {
      display: flex;
      gap: 10px;
    }
    .select-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex: 1;
      justify-content: flex-end;
    }
    select, button {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
      color: #e6edf3;
      outline: none;
      cursor: pointer;
    }
    select:hover, button:hover { background: rgba(255,255,255,0.08); }
    button.primary { background: #2b6ef7; border-color: #2b6ef7; }
    button.danger  { background: #e23b3b; border-color: #e23b3b; }

    /* 画布外框，用于显示边框与圆角 */
    .canvas-frame {
      width: 500px;
      height: 500px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
    }

    /* 画布本身透明，让主题背景透过显示 */
    canvas {
      display: block;
      width: 500px;
      height: 500px;
      background: transparent;
    }

    /* ========= 多背景主题（使用纯 CSS，无需外部资源） ========= */
    /* 经典绿：淡绿色底色 */
    .bg-classic {
      background: #e6ffe6;
    }
    /* 夜空渐变：深色渐变，突出蛇与食物 */
    .bg-night {
      background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
    }
    /* 棋盘格：适度的棋盘式对比 */
    .bg-checker {
      background:
        linear-gradient(45deg, rgba(255,255,255,0.08) 25%, transparent 25%) -12px 0/24px 24px,
        linear-gradient(-45deg, rgba(255,255,255,0.08) 25%, transparent 25%) -12px 0/24px 24px,
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.08) 75%) -12px 0/24px 24px,
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.08) 75%) -12px 0/24px 24px,
        #101317;
    }
    /* 网格线：使用重复线条模拟格子 */
    .bg-grid {
      background:
        linear-gradient(#0000 19px, rgba(255,255,255,0.12) 20px, #0000 21px),
        linear-gradient(90deg, #0000 19px, rgba(255,255,255,0.12) 20px, #0000 21px),
        #12161c;
      background-size: 20px 20px, 20px 20px, auto;
    }
    /* 彩虹霓虹：高饱和渐变，偏娱乐风格 */
    .bg-rainbow {
      background: linear-gradient(135deg, #ff7a7a, #f7b42c 25%, #45ef81 50%, #2bb5f7 75%, #a77bf3);
    }

    /* 底部说明文案 */
    .hint {
      margin-top: 12px;
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="gameWrapper" class="game-wrapper bg-night">
      <div class="toolbar">
        <div class="scoreboard">
          <div class="score">积分：<span id="score">0</span></div>
          <div class="best">最佳：<span id="best">0</span></div>
        </div>
        <div class="controls">
          <button id="startBtn" class="primary">开始/继续</button>
          <button id="pauseBtn">暂停</button>
          <button id="restartBtn" class="danger">重开</button>
        </div>
        <div class="select-row">
          <label for="bgSelect">背景主题：</label>
          <select id="bgSelect" aria-label="背景主题选择">
            <option value="bg-night">夜空渐变</option>
            <option value="bg-classic">经典绿</option>
            <option value="bg-grid">网格线</option>
            <option value="bg-checker">棋盘格</option>
            <option value="bg-rainbow">彩虹霓虹</option>
          </select>
        </div>
      </div>

      <div class="canvas-frame">
        <canvas id="game" width="500" height="500"></canvas>
      </div>

      <div class="hint">方向键或 WASD 控制蛇移动；吃到食物加分；撞墙或撞到自身游戏结束。支持积分统计与背景切换。</div>
    </div>
  </div>

  <script>
    /* ========= 贪吃蛇主逻辑（原生 JS，中文注释） ========= */

    // 基本常量：格子大小与行列数量（画布 500x500，格子 20 => 25x25）
    const TILE_SIZE = 20;
    const COLS = 25;
    const ROWS = 25;

    // 画布上下文
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // 计分与最佳分记录（localStorage 持久化最佳分）
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const LS_KEY_BEST = 'snake_best_score_v1';
    let score = 0;
    let best = Number(localStorage.getItem(LS_KEY_BEST) || 0);
    bestEl.textContent = String(best);

    // 控制按钮与背景切换
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const restartBtn = document.getElementById('restartBtn');
    const bgSelect = document.getElementById('bgSelect');
    const wrapper = document.getElementById('gameWrapper');

    // 游戏状态
    let snake = [];             // 存储蛇的每一个格子坐标，如 {x: 12, y: 10}
    let direction = { x: 1, y: 0 };    // 当前移动方向（初始向右）
    let nextDirection = { x: 1, y: 0 }; // 缓存下一帧方向，避免同帧内多次反向导致穿越
    let food = { x: 0, y: 0 };  // 食物所在格子坐标
    let running = false;        // 是否处于运行中
    let gameOver = false;       // 是否已结束
    let tickTimer = null;       // 主循环定时器
    let tickMs = 120;           // 移动速度（毫秒/步）

    // 初始化游戏：设置蛇初始长度、方向与食物
    function initGame() {
      score = 0;
      scoreEl.textContent = '0';
      gameOver = false;
      running = false;

      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };

      // 初始蛇：长度3，居中偏左
      const startX = Math.floor(COLS / 2) - 2;
      const startY = Math.floor(ROWS / 2);
      snake = [
        { x: startX,     y: startY },
        { x: startX + 1, y: startY },
        { x: startX + 2, y: startY }
      ];

      // 随机生成食物位置，且不与蛇重叠
      spawnFood();

      // 首次绘制
      draw();
    }

    // 随机生成食物坐标，确保不与蛇重叠
    function spawnFood() {
      while (true) {
        const fx = Math.floor(Math.random() * COLS);
        const fy = Math.floor(Math.random() * ROWS);
        const overlap = snake.some(seg => seg.x === fx && seg.y === fy);
        if (!overlap) {
          food = { x: fx, y: fy };
          return;
        }
      }
    }

    // 启动（或继续）游戏
    function startGame() {
      if (gameOver) {
        return; // 结束后请使用“重开”
      }
      if (!running) {
        running = true;
        if (tickTimer) clearInterval(tickTimer);
        tickTimer = setInterval(tick, tickMs);
      }
    }

    // 暂停游戏
    function pauseGame() {
      running = false;
      if (tickTimer) {
        clearInterval(tickTimer);
        tickTimer = null;
      }
    }

    // 重开游戏：重新初始化并开始
    function restartGame() {
      pauseGame();
      initGame();
      startGame();
    }

    // 主循环：推进一帧
    function tick() {
      // 将下一帧方向应用为当前方向（保证方向更新与移动不同步问题得到缓解）
      direction = nextDirection;

      // 计算新头部坐标
      const head = snake[snake.length - 1];
      const newHead = { x: head.x + direction.x, y: head.y + direction.y };

      // 撞墙判定
      if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
        return endGame();
      }

      // 撞到自身判定
      if (snake.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
        return endGame();
      }

      // 将新头压入蛇体
      snake.push(newHead);

      // 吃到食物：加分并生成新食物；否则移除尾巴保持长度
      if (newHead.x === food.x && newHead.y === food.y) {
        score += 10; // 每次加 10 分
        scoreEl.textContent = String(score);
        if (score > best) {
          best = score;
          bestEl.textContent = String(best);
          localStorage.setItem(LS_KEY_BEST, String(best));
        }
        spawnFood();
        // 可选：随分数略微提速（上限控制）
        if (tickMs > 60) {
          tickMs -= 2;
          clearInterval(tickTimer);
          tickTimer = setInterval(tick, tickMs);
        }
      } else {
        // 未吃到食物：移除尾巴，长度不变
        snake.shift();
      }

      // 绘制画面
      draw();
    }

    // 结束游戏：停止循环并标记结束
    function endGame() {
      gameOver = true;
      pauseGame();
      // 简单的结束提示绘制在画布上
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 28px Segoe UI, Arial';
      ctx.textAlign = 'center';
      ctx.fillText('游戏结束', canvas.width / 2, canvas.height / 2 - 10);
      ctx.font = '16px Segoe UI, Arial';
      ctx.fillText('按“重开”重新开始', canvas.width / 2, canvas.height / 2 + 24);
      ctx.restore();
    }

    // 绘制蛇与食物
    function draw() {
      // 清空画布（透明，让主题背景透出）
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 绘制食物
      drawCell(food.x, food.y, '#ff4757');

      // 绘制蛇体（尾到头），头部颜色更亮以区分
      for (let i = 0; i < snake.length; i++) {
        const seg = snake[i];
        const isHead = i === snake.length - 1;
        drawCell(seg.x, seg.y, isHead ? '#38ef7d' : '#2fbd6a');
      }
    }

    // 绘制一个格子（带微圆角）
    function drawCell(cx, cy, color) {
      const px = cx * TILE_SIZE;
      const py = cy * TILE_SIZE;
      ctx.fillStyle = color;
      const r = 4; // 圆角半径
      roundRect(ctx, px + 1, py + 1, TILE_SIZE - 2, TILE_SIZE - 2, r);
      ctx.fill();
    }

    // 辅助：圆角矩形路径
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    // 键盘事件：方向控制（阻止直接反向导致立即死亡）
    window.addEventListener('keydown', (e) => {
      if (gameOver) return;

      const key = e.key.toLowerCase();
      let ndx = nextDirection.x;
      let ndy = nextDirection.y;

      if (key === 'arrowup' || key === 'w')       { ndx = 0; ndy = -1; }
      else if (key === 'arrowdown' || key === 's'){ ndx = 0; ndy = 1;  }
      else if (key === 'arrowleft' || key === 'a'){ ndx = -1; ndy = 0; }
      else if (key === 'arrowright' || key === 'd'){ ndx = 1; ndy = 0; }

      // 防止在同一帧内直接反向（与当前方向相反）
      if (ndx === -direction.x && ndy === -direction.y) {
        return;
      }

      nextDirection = { x: ndx, y: ndy };
    });

    // 背景主题切换：替换外层容器的类名
    bgSelect.addEventListener('change', () => {
      const cls = bgSelect.value;
      wrapper.classList.remove('bg-night', 'bg-classic', 'bg-grid', 'bg-checker', 'bg-rainbow');
      wrapper.classList.add(cls);
    });

    // 按钮事件
    startBtn.addEventListener('click', startGame);
    pauseBtn.addEventListener('click', pauseGame);
    restartBtn.addEventListener('click', restartGame);

    // 首次初始化
    initGame();
  </script>
</body>
</html>
