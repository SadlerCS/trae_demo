<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        /* 草地背景 */
        .bg-grass {
            background: linear-gradient(135deg, #2d5a27 0%, #4a7c43 50%, #2d5a27 100%);
        }

        /* 星空背景 */
        .bg-space {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }

        /* 海洋背景 */
        .bg-ocean {
            background: linear-gradient(135deg, #1a4f72 0%, #2874a6 50%, #1a4f72 100%);
        }

        /* 沙漠背景 */
        .bg-desert {
            background: linear-gradient(135deg, #d4a574 0%, #c49a6c 50%, #b8956e 100%);
        }

        /* 游戏容器 */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* 游戏标题 */
        h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
        }

        /* 顶部信息栏 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 400px;
            margin-bottom: 15px;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            color: white;
        }

        /* 分数显示 */
        .score {
            font-size: 1.4em;
            font-weight: bold;
        }

        /* 背景切换按钮 */
        .bg-selector {
            display: flex;
            gap: 8px;
        }

        .bg-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .bg-btn:hover {
            transform: scale(1.2);
        }

        .bg-btn.active {
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* 草地按钮 */
        .bg-btn.grass { background: linear-gradient(135deg, #2d5a27, #4a7c43); }
        /* 星空按钮 */
        .bg-btn.space { background: linear-gradient(135deg, #0f0c29, #302b63); }
        /* 海洋按钮 */
        .bg-btn.ocean { background: linear-gradient(135deg, #1a4f72, #2874a6); }
        /* 沙漠按钮 */
        .bg-btn.desert { background: linear-gradient(135deg, #d4a574, #c49a6c); }

        /* 游戏画布容器 */
        .canvas-container {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* 游戏画布 */
        #gameCanvas {
            display: block;
            background: #1a1a2e;
        }

        /* 游戏提示信息 */
        .game-info {
            margin-top: 15px;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            color: white;
            text-align: center;
        }

        .controls {
            margin-top: 10px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        /* 开始/重新开始按钮 */
        .start-btn {
            padding: 12px 40px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }

        /* 游戏结束遮罩层 */
        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            border-radius: 15px;
        }

        .game-over-overlay.show {
            display: flex;
        }

        .game-over-text {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.5);
        }

        .final-score {
            font-size: 1.5em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="bg-grass">
    <div class="game-container">
        <!-- 游戏标题 -->
        <h1>🐍 贪吃蛇游戏 🐍</h1>
        
        <!-- 顶部信息栏 -->
        <div class="top-bar">
            <div class="score">得分: <span id="score">0</span> | 最高分: <span id="highScore">0</span></div>
            <div class="bg-selector">
                <button class="bg-btn grass active" onclick="changeBackground('grass')" title="草地"></button>
                <button class="bg-btn space" onclick="changeBackground('space')" title="星空"></button>
                <button class="bg-btn ocean" onclick="changeBackground('ocean')" title="海洋"></button>
                <button class="bg-btn desert" onclick="changeBackground('desert')" title="沙漠"></button>
            </div>
        </div>
        
        <!-- 游戏画布容器 -->
        <div class="canvas-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="game-over-overlay" id="gameOverOverlay">
                <div class="game-over-text">游戏结束!</div>
                <div class="final-score">最终得分: <span id="finalScore">0</span></div>
                <button class="start-btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>
        
        <!-- 游戏提示信息 -->
        <div class="game-info">
            <div>使用 <strong>方向键</strong> 或 <strong>WASD</strong> 控制蛇的移动方向</div>
            <div class="controls">按 <strong>P</strong> 键暂停/继续游戏</div>
        </div>
        
        <!-- 开始游戏按钮 -->
        <button class="start-btn" id="startBtn" onclick="startGame()">开始游戏</button>
    </div>

    <script>
        // 获取画布和绘图上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏配置参数
        const gridSize = 20;        // 网格大小（每个格子20像素）
        const gridCount = 20;       // 网格数量（20x20的游戏区域）
        const gameSpeed = 150;      // 游戏速度（毫秒）

        // 游戏状态变量
        let snake = [];             // 蛇的身体数组
        let food = {};              // 食物位置
        let direction = 'right';    // 当前移动方向
        let nextDirection = 'right'; // 下一步的方向（用于防止快速按键导致的问题）
        let score = 0;              // 当前得分
        let highScore = 0;          // 最高分
        let gameLoop = null;        // 游戏循环定时器
        let isGameRunning = false;  // 游戏是否正在运行
        let isPaused = false;       // 游戏是否暂停

        // 初始化蛇的初始位置
        function initSnake() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
        }

        // 生成随机食物位置
        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * gridCount),
                    y: Math.floor(Math.random() * gridCount)
                };
            } while (isOnSnake(food.x, food.y)); // 确保食物不在蛇身上
        }

        // 检查位置是否在蛇身上
        function isOnSnake(x, y) {
            return snake.some(segment => segment.x === x && segment.y === y);
        }

        // 绘制游戏画面
        function draw() {
            // 清除画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格（可选，用于美化）
            drawGrid();

            // 绘制食物
            drawFood();

            // 绘制蛇
            drawSnake();
        }

        // 绘制网格背景
        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;

            for (let i = 0; i <= gridCount; i++) {
                // 绘制竖线
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                // 绘制横线
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        // 绘制食物
        function drawFood() {
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // 添加食物光泽效果
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 3,
                food.y * gridSize + gridSize / 3,
                gridSize / 6,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        // 绘制蛇
        function drawSnake() {
            snake.forEach((segment, index) => {
                // 蛇头使用不同的颜色
                if (index === 0) {
                    ctx.fillStyle = '#2ecc71';
                } else {
                    // 蛇身颜色渐变效果
                    const green = Math.max(100, 200 - index * 5);
                    ctx.fillStyle = `rgb(46, ${green}, 113)`;
                }

                // 绘制圆角矩形作为蛇的身体
                const x = segment.x * gridSize + 1;
                const y = segment.y * gridSize + 1;
                const size = gridSize - 2;
                const radius = 5;

                ctx.beginPath();
                ctx.roundRect(x, y, size, size, radius);
                ctx.fill();

                // 为蛇头添加眼睛
                if (index === 0) {
                    drawSnakeEyes(segment);
                }
            });
        }

        // 绘制蛇的眼睛（根据方向变化）
        function drawSnakeEyes(head) {
            ctx.fillStyle = 'white';
            const eyeSize = 4;
            const pupilSize = 2;
            const centerX = head.x * gridSize + gridSize / 2;
            const centerY = head.y * gridSize + gridSize / 2;

            let eye1X, eye1Y, eye2X, eye2Y;
            const offset = 4;

            // 根据方向确定眼睛位置
            switch (direction) {
                case 'up':
                    eye1X = centerX - offset;
                    eye1Y = centerY - 3;
                    eye2X = centerX + offset;
                    eye2Y = centerY - 3;
                    break;
                case 'down':
                    eye1X = centerX - offset;
                    eye1Y = centerY + 3;
                    eye2X = centerX + offset;
                    eye2Y = centerY + 3;
                    break;
                case 'left':
                    eye1X = centerX - 3;
                    eye1Y = centerY - offset;
                    eye2X = centerX - 3;
                    eye2Y = centerY + offset;
                    break;
                case 'right':
                    eye1X = centerX + 3;
                    eye1Y = centerY - offset;
                    eye2X = centerX + 3;
                    eye2Y = centerY + offset;
                    break;
            }

            // 绘制左眼
            ctx.beginPath();
            ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
            ctx.fill();

            // 绘制右眼
            ctx.beginPath();
            ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
            ctx.fill();

            // 绘制瞳孔
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(eye1X, eye1Y, pupilSize, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(eye2X, eye2Y, pupilSize, 0, Math.PI * 2);
            ctx.fill();
        }

        // 更新游戏状态
        function update() {
            if (isPaused) return;

            // 应用方向改变
            direction = nextDirection;

            // 计算新的蛇头位置
            const head = { ...snake[0] };
            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }

            // 检测碰撞（墙壁和自身）
            if (checkCollision(head)) {
                gameOver();
                return;
            }

            // 将新头部添加到蛇身
            snake.unshift(head);

            // 检测是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                // 增加得分
                score += 10;
                updateScore();
                // 生成新的食物
                generateFood();
            } else {
                // 没有吃到食物，移除尾巴（保持蛇长度不变）
                snake.pop();
            }

            // 重绘画布
            draw();
        }

        // 检测碰撞
        function checkCollision(head) {
            // 检测是否撞墙
            if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount) {
                return true;
            }

            // 检测是否撞到自己（从第4个节点开始检测，避免头部与第二个节点误判）
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    return true;
                }
            }

            return false;
        }

        // 游戏结束
        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;

            // 更新最高分
            if (score > highScore) {
                highScore = score;
                document.getElementById('highScore').textContent = highScore;
            }

            // 显示游戏结束界面
            document.getElementById('gameOverOverlay').classList.add('show');
            document.getElementById('startBtn').textContent = '重新开始';
        }

        // 更新分数显示
        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        // 开始游戏
        function startGame() {
            // 重置游戏状态
            initSnake();
            generateFood();
            score = 0;
            direction = 'right';
            nextDirection = 'right';
            isPaused = false;
            isGameRunning = true;

            // 更新分数显示
            updateScore();

            // 隐藏游戏结束界面
            document.getElementById('gameOverOverlay').classList.remove('show');
            document.getElementById('startBtn').textContent = '重新开始';

            // 清空之前的游戏循环
            if (gameLoop) {
                clearInterval(gameLoop);
            }

            // 绘制初始画面
            draw();

            // 开始游戏循环
            gameLoop = setInterval(update, gameSpeed);
        }

        // 重新开始游戏
        function restartGame() {
            startGame();
        }

        // 切换背景
        function changeBackground(bgName) {
            // 移除body上所有的背景类
            document.body.className = 'bg-' + bgName;

            // 更新按钮激活状态
            document.querySelectorAll('.bg-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector('.bg-btn.' + bgName).classList.add('active');
        }

        // 键盘事件监听
        document.addEventListener('keydown', function (e) {
            // 如果游戏未开始，忽略方向键（允许空格键开始）
            if (!isGameRunning && !['p', 'P', ' '].includes(e.key)) {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'W', 'a', 'A', 's', 'S', 'd', 'D'].includes(e.key)) {
                    return;
                }
            }

            // 方向键或WASD键控制蛇的方向
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction !== 'down') {
                        nextDirection = 'up';
                    }
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction !== 'up') {
                        nextDirection = 'down';
                    }
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction !== 'right') {
                        nextDirection = 'left';
                    }
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction !== 'left') {
                        nextDirection = 'right';
                    }
                    e.preventDefault();
                    break;
                case 'p':
                case 'P':
                    // 暂停/继续游戏
                    if (isGameRunning) {
                        isPaused = !isPaused;
                        if (!isPaused) {
                            // 继续游戏时重新设置定时器
                            clearInterval(gameLoop);
                            gameLoop = setInterval(update, gameSpeed);
                        }
                    }
                    break;
                case ' ':
                    // 空格键开始/重新开始游戏
                    if (!isGameRunning) {
                        startGame();
                    }
                    e.preventDefault();
                    break;
            }
        });

        // 页面加载时初始化游戏画面
        window.onload = function () {
            initSnake();
            generateFood();
            draw();
        };
    </script>
</body>
</html>
