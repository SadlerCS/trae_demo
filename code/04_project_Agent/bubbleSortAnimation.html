<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>冒泡排序 · 网页动画讲解</title>
  <style>
    :root { --bg:#0e1217; --fg:#e6edf3; --muted:#a8b0bb; --primary:#2b6ef7; --compare:#f7b42c; --swap:#e23b3b; --sorted:#38ef7d; --panel:#11161d; --card:#0f141a; --barw:24px; --gap:8px; --anim:420ms; }
    * { box-sizing: border-box; }
    html, body { height:100%; margin:0; background:var(--bg); color:var(--fg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial; }
    .page { min-height:100%; display:flex; padding:24px; }
    .left { flex: 0 0 780px; margin-right: 20px; }
    .right { flex: 1 1 auto; }
    .card { background: var(--card); border:1px solid rgba(255,255,255,0.08); border-radius: 14px; box-shadow: 0 14px 40px rgba(0,0,0,0.45); }
    .toolbar { display:flex; flex-wrap:wrap; align-items:center; gap:10px; padding:14px; }
    .toolbar h1 { font-size:18px; margin:0; margin-right:auto; }
    .toolbar .controls { display:flex; gap:8px; }
    button, select, input[type="range"] { color:var(--fg); background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.14); border-radius: 10px; padding:8px 12px; cursor:pointer; }
    button:hover, select:hover { background: rgba(255,255,255,0.1); }
    button.primary { background: var(--primary); border-color: var(--primary); }
    .status { padding: 10px 14px; border-top:1px solid rgba(255,255,255,0.08); font-size:13px; display:flex; gap:16px; align-items:center; }
    .status .badge { background: rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14); padding:4px 8px; border-radius: 8px; }
    .board { padding: 18px; }
    .bars-wrap { position:relative; width: 760px; height: 360px; margin: 0 auto; background: var(--panel); border:1px solid rgba(255,255,255,0.08); border-radius: 12px; }
    .legend { display:flex; gap:10px; padding:10px 14px; font-size:12px; color:var(--muted); }
    .legend .dot { width:12px; height:12px; border-radius:50%; display:inline-block; margin-right:6px; vertical-align: middle; }
    .bars { position:absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 720px; height: 300px; }
    .bar { position:absolute; bottom:0; width: var(--barw); background: #2fbd6a; border-radius: 6px 6px 0 0; transform: translateX(0); transition: transform var(--anim) ease; display:flex; align-items:flex-end; justify-content:center; }
    .bar .label { font-size:11px; color:#101317; background: rgba(255,255,255,0.85); border-radius: 6px; padding:2px 6px; margin-bottom:6px; }
    .bar.compare { background: var(--compare); }
    .bar.swap { background: var(--swap); }
    .bar.sorted { background: var(--sorted); }
    .panel { padding: 16px; }
    .panel h2 { margin: 0 0 10px 0; font-size:16px; }
    .panel p { margin: 8px 0; color: var(--muted); font-size: 14px; }
    .grid { display:grid; grid-template-columns: 1fr; gap:12px; }
    .code { background: var(--panel); border:1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 14px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono"; font-size: 13px; color: #cfe3ff; }
    .highlight { color: #ffd47e; }
    .footer { padding: 10px 14px; border-top:1px solid rgba(255,255,255,0.08); font-size:12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="page">
    <div class="left">
      <div class="card">
        <div class="toolbar">
          <h1>冒泡排序 · 动画讲解</h1>
          <div class="controls">
            <button id="play" class="primary">播放</button>
            <button id="pause">暂停</button>
            <button id="step">单步</button>
            <button id="reset">重置</button>
            <button id="shuffle">打乱</button>
          </div>
          <div class="controls">
            <label>速度 <input id="speed" type="range" min="0.3" max="2" step="0.1" value="1" /></label>
          </div>
        </div>
        <div class="status">
          <div class="badge">轮次 <span id="pass">0</span></div>
          <div class="badge">比较索引 <span id="idx">-</span></div>
          <div class="badge">已就位数量 <span id="sortedCount">0</span></div>
        </div>
        <div class="board">
          <div class="bars-wrap">
            <div id="bars" class="bars"></div>
          </div>
          <div class="legend">
            <span><span class="dot" style="background:#2fbd6a"></span>普通</span>
            <span><span class="dot" style="background:#f7b42c"></span>比较</span>
            <span><span class="dot" style="background:#e23b3b"></span>交换</span>
            <span><span class="dot" style="background:#38ef7d"></span>已就位</span>
          </div>
        </div>
        <div class="footer">可视化思路：以柱状高度表示数值，左右相邻的比较高亮显示；发生交换时两柱交叉移动；每轮结束将末尾元素标记为已就位。</div>
      </div>
    </div>
    <div class="right">
      <div class="card panel">
        <h2>核心概念</h2>
        <p>冒泡排序通过重复比较相邻元素并将较大的值逐步“冒泡”到序列末端。完成一轮后，末尾元素为当前最大值并就位。</p>
        <div class="grid">
          <div class="code" id="pseudo"></div>
          <div class="code">
            特性：
            <br/>• 时间复杂度：最坏/平均 O(n²)，最好 O(n)（若有提前终止优化）
            <br/>• 空间复杂度：O(1)
            <br/>• 稳定性：稳定
            <br/>• 适用场景：教学、数据量小且几乎有序的情况
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const N = 20
    const BAR_W = 24
    const GAP = 8
    const barsEl = document.getElementById('bars')
    const playBtn = document.getElementById('play')
    const pauseBtn = document.getElementById('pause')
    const stepBtn = document.getElementById('step')
    const resetBtn = document.getElementById('reset')
    const shuffleBtn = document.getElementById('shuffle')
    const speedEl = document.getElementById('speed')
    const passEl = document.getElementById('pass')
    const idxEl = document.getElementById('idx')
    const sortedCountEl = document.getElementById('sortedCount')
    const pseudoEl = document.getElementById('pseudo')

    let values = []
    let posToBar = []
    let gen = null
    let running = false
    let speed = 1
    let sortedBoundary = N

    function randValues() {
      const arr = []
      for (let i = 0; i < N; i++) arr.push(5 + Math.floor(Math.random() * 95))
      return arr
    }

    function renderBars() {
      barsEl.innerHTML = ''
      barsEl.style.width = `${N * (BAR_W + GAP)}px`
      for (let i = 0; i < N; i++) {
        const bar = document.createElement('div')
        bar.className = 'bar'
        bar.style.height = `${values[i]}%`
        bar.style.transform = `translateX(${i * (BAR_W + GAP)}px)`
        bar.style.width = `${BAR_W}px`
        const label = document.createElement('div')
        label.className = 'label'
        label.textContent = values[i]
        bar.appendChild(label)
        barsEl.appendChild(bar)
      }
      posToBar = Array.from(barsEl.children)
    }

    function* bubbleSteps(arr) {
      const n = arr.length
      for (let i = 0; i < n - 1; i++) {
        for (let j = 0; j < n - 1 - i; j++) {
          yield { type:'compare', i:j, j:j+1, pass:i }
          if (arr[j] > arr[j+1]) {
            const t = arr[j]; arr[j] = arr[j+1]; arr[j+1] = t
            yield { type:'swap', i:j, j:j+1, pass:i }
          }
        }
        yield { type:'pass_complete', boundary: n - 1 - i }
      }
      yield { type:'done' }
    }

    function setSpeed(v) {
      speed = Number(v)
      const dur = Math.max(150, 420 / speed)
      document.documentElement.style.setProperty('--anim', `${dur}ms`)
    }

    function clearStates() {
      for (const b of posToBar) b.classList.remove('compare','swap')
    }

    function markSorted(boundary) {
      for (let k = 0; k < N; k++) posToBar[k].classList.toggle('sorted', k >= boundary)
      sortedBoundary = boundary
      sortedCountEl.textContent = String(N - boundary)
    }

    function highlightCompare(a, b) {
      clearStates()
      posToBar[a].classList.add('compare')
      posToBar[b].classList.add('compare')
    }

    function animateSwap(a, b) {
      posToBar[a].classList.add('swap')
      posToBar[b].classList.add('swap')
      const ax = a * (BAR_W + GAP)
      const bx = b * (BAR_W + GAP)
      posToBar[a].style.transform = `translateX(${bx}px)`
      posToBar[b].style.transform = `translateX(${ax}px)`
      const ta = posToBar[a]
      posToBar[a] = posToBar[b]
      posToBar[b] = ta
      return new Promise(res => setTimeout(res, parseInt(getComputedStyle(document.documentElement).getPropertyValue('--anim'))))
    }

    async function stepOnce() {
      const n = gen.next()
      if (n.done) return false
      const ev = n.value
      if (ev.type === 'compare') {
        highlightCompare(ev.i, ev.j)
        passEl.textContent = String(ev.pass)
        idxEl.textContent = `${ev.i} 与 ${ev.j}`
        await new Promise(r => setTimeout(r, 120 / speed))
      } else if (ev.type === 'swap') {
        await animateSwap(ev.i, ev.j)
      } else if (ev.type === 'pass_complete') {
        markSorted(ev.boundary)
        clearStates()
      } else if (ev.type === 'done') {
        markSorted(0)
        clearStates()
        return false
      }
      return true
    }

    async function run() {
      running = true
      playBtn.disabled = true
      pauseBtn.disabled = false
      while (running) {
        const ok = await stepOnce()
        if (!ok) break
      }
      running = false
      playBtn.disabled = false
      pauseBtn.disabled = true
    }

    function reset() {
      running = false
      playBtn.disabled = false
      pauseBtn.disabled = true
      values = values.slice().sort((a,b)=>a-b)
      renderBars()
      gen = bubbleSteps(values.slice())
      markSorted(N)
      passEl.textContent = '0'
      idxEl.textContent = '-'
    }

    function shuffle() {
      running = false
      playBtn.disabled = false
      pauseBtn.disabled = true
      values = randValues()
      renderBars()
      gen = bubbleSteps(values.slice())
      markSorted(N)
      passEl.textContent = '0'
      idxEl.textContent = '-'
    }

    playBtn.addEventListener('click', () => { if (!running) run() })
    pauseBtn.addEventListener('click', () => { running = false })
    stepBtn.addEventListener('click', () => { if (!running) stepOnce() })
    resetBtn.addEventListener('click', reset)
    shuffleBtn.addEventListener('click', shuffle)
    speedEl.addEventListener('input', e => setSpeed(e.target.value))

    function renderPseudo(pass = 0, idx = '-') {
      const lines = [
        'for i = 0 .. n-2:',
        '  for j = 0 .. n-2-i:',
        '    if A[j] > A[j+1]:',
        '      swap(A[j], A[j+1])'
      ]
      pseudoEl.innerHTML = `<div>i = <span class="highlight">${pass}</span>, j = <span class="highlight">${idx}</span></div>` +
        `<pre>${lines.join('\n')}</pre>`
    }

    setSpeed(speedEl.value)
    values = randValues()
    renderBars()
    gen = bubbleSteps(values.slice())
    markSorted(N)
    renderPseudo()
  </script>
</body>
</html>
