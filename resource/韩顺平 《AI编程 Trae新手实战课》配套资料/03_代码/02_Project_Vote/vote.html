<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线投票</title>
  <style>
    :root {
      --bg: #f7fafc;
      --card-bg: #ffffff;
      --primary: #3b82f6;
      --primary-100: #e6f0ff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #f7fafc, #eef2f7);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Microsoft YaHei", sans-serif;
    }
    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .card {
      width: 100%;
      max-width: 760px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(31, 41, 55, 0.08);
      padding: 24px;
    }
    .card header { margin-bottom: 16px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    .subtitle { color: var(--muted); font-size: 14px; }
    hr { border: none; height: 1px; background: var(--border); margin: 16px 0; }
    label { font-weight: 600; }
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      background: #fafafa;
      transition: border-color .2s, box-shadow .2s;
    }
    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
      background: #fff;
    }
    .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 640px) { .options-grid { grid-template-columns: 1fr 1fr; } }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .button {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(59,130,246,.18);
      transition: transform .05s ease, box-shadow .2s ease, background-color .2s ease;
    }
    .button:active { transform: translateY(1px); box-shadow: 0 2px 8px rgba(59,130,246,.15); }
    .button.primary { background: var(--primary); color: white; }
    .button.secondary { background: var(--primary-100); color: var(--primary); box-shadow: 0 4px 12px rgba(118,161,255,.2); }
    .button.muted { background: #f3f4f6; color: var(--text); box-shadow: 0 2px 8px rgba(31, 41, 55, 0.06); }
    .button.danger { background: #fee2e2; color: #b91c1c; box-shadow: 0 4px 12px rgba(239,68,68,.2); }
    .small { font-size: 12px; padding: 8px 12px; }

    .vote-list { display: flex; flex-direction: column; gap: 12px; }
    .option-item { display: flex; align-items: center; gap: 12px; padding: 12px; border: 1px solid var(--border); border-radius: 12px; background: #f9fafb; }
    .option-text { flex: 1; font-weight: 600; }
    .vote-btn { min-width: 84px; }
    .bar { height: 10px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--primary); border-radius: 999px; width: 0%; transition: width .3s ease; }
    .result-row { display: flex; align-items: center; gap: 12px; }
    .count { color: var(--muted); min-width: 90px; text-align: right; }
    .percent { color: #2563eb; min-width: 56px; text-align: right; font-weight: 700; }

    .notice { display: flex; align-items: center; gap: 8px; background: #eff6ff; color: #1e40af; border: 1px solid #dbeafe; padding: 10px 12px; border-radius: 10px; }
    .hidden { display: none; }
    footer { margin-top: 16px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  </style>
  </head>
  <body>
  <main>
    <section class="card">
      <header>
        <h1>在线投票</h1>
        <div class="subtitle">创建投票、点击投票并实时查看结果</div>
      </header>

      <div id="creationView">
        <div style="margin-bottom:12px;">
          <label for="titleInput">投票标题</label>
          <input id="titleInput" type="text" placeholder="例如：本周团队午餐选择" />
        </div>
        <div style="margin-bottom:12px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
            <label>选项</label>
            <div class="btn-row">
              <button id="addOptionBtn" class="button secondary small">添加选项</button>
            </div>
          </div>
          <div id="optionsGrid" class="options-grid"></div>
          <div class="btn-row" style="margin-top:12px;">
            <button id="startBtn" class="button primary">开始投票</button>
            <button id="resetBtn" class="button muted">重置投票</button>
          </div>
        </div>
        <div id="creationNotice" class="notice hidden"></div>
      </div>

      <div id="voteView" class="hidden">
        <div style="margin-bottom:12px;">
          <div style="font-size:18px; font-weight:700;" id="voteTitle"></div>
        </div>
        <div class="vote-list" id="voteList"></div>
        <footer>
          <div id="statusTag" class="notice hidden"></div>
          <div class="btn-row">
            <button id="resetBtn2" class="button danger small">重置投票</button>
          </div>
        </footer>
      </div>
    </section>
  </main>

  <script>
    // 使用 localStorage 持久化投票状态
    const STORAGE_KEY = 'vote_state';

    // 加载本地存储的投票状态
    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        console.error('读取本地存储失败', e);
        return null;
      }
    }

    // 保存投票状态到本地存储
    function saveState(state) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        console.error('写入本地存储失败', e);
      }
    }

    // 清空投票状态
    function clearState() {
      localStorage.removeItem(STORAGE_KEY);
    }

    // ---- UI helpers ----
    const creationView = document.getElementById('creationView');
    const voteView = document.getElementById('voteView');
    const voteTitleEl = document.getElementById('voteTitle');
    const voteListEl = document.getElementById('voteList');
    const creationNotice = document.getElementById('creationNotice');
    const statusTag = document.getElementById('statusTag');

    const titleInput = document.getElementById('titleInput');
    const optionsGrid = document.getElementById('optionsGrid');
    const addOptionBtn = document.getElementById('addOptionBtn');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const resetBtn2 = document.getElementById('resetBtn2');

    function showCreationView() {
      creationView.classList.remove('hidden');
      voteView.classList.add('hidden');
    }

    function showVoteView() {
      creationView.classList.add('hidden');
      voteView.classList.remove('hidden');
    }

    // 创建一个选项输入行
    function createOptionInput(value = '') {
      const wrapper = document.createElement('div');
      wrapper.style.display = 'flex';
      wrapper.style.gap = '8px';
      wrapper.style.alignItems = 'center';

      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = '选项内容';
      input.value = value;
      input.style.flex = '1';
      input.className = 'option-input';

      const delBtn = document.createElement('button');
      delBtn.textContent = '删除';
      delBtn.className = 'button muted small';
      delBtn.addEventListener('click', () => {
        optionsGrid.removeChild(wrapper);
      });

      wrapper.appendChild(input);
      wrapper.appendChild(delBtn);
      return wrapper;
    }

    // 收集创建表单数据并校验
    function collectCreationData() {
      const title = titleInput.value.trim();
      const optionInputs = Array.from(optionsGrid.querySelectorAll('.option-input'));
      const texts = optionInputs.map(i => i.value.trim()).filter(t => t.length > 0);

      const errors = [];
      if (!title) errors.push('请输入投票标题');
      if (texts.length < 2) errors.push('至少需要 2 个有效选项');
      const unique = new Set(texts);
      if (unique.size !== texts.length) errors.push('选项内容不能重复');

      return { title, texts, errors };
    }

    // 初始化默认选项输入
    function ensureMinOptions(count = 2) {
      const current = optionsGrid.querySelectorAll('.option-input').length;
      for (let i = current; i < count; i++) {
        optionsGrid.appendChild(createOptionInput());
      }
    }

    // 渲染投票区域
    function renderVoteArea(state) {
      voteTitleEl.textContent = state.title;
      voteListEl.innerHTML = '';

      const total = state.options.reduce((sum, o) => sum + o.votes, 0);

      state.options.forEach(option => {
        const percent = total > 0 ? Math.round(option.votes / total * 100) : 0;

        const item = document.createElement('div');
        item.className = 'option-item';

        const text = document.createElement('div');
        text.className = 'option-text';
        text.textContent = option.text;

        const voteBtn = document.createElement('button');
        voteBtn.className = 'button primary vote-btn';
        voteBtn.textContent = '投票';
        voteBtn.disabled = !!state.hasVoted;
        voteBtn.title = state.hasVoted ? '已投票，不可重复投票' : '为该选项投票';
        voteBtn.addEventListener('click', () => handleVote(option.id));

        const result = document.createElement('div');
        result.style.flex = '1';
        result.style.display = 'flex';
        result.style.flexDirection = 'column';
        result.style.gap = '8px';

        const row = document.createElement('div');
        row.className = 'result-row';
        const count = document.createElement('div');
        count.className = 'count';
        count.textContent = `${option.votes} 票`;
        const percentEl = document.createElement('div');
        percentEl.className = 'percent';
        percentEl.textContent = `${percent}%`;
        row.appendChild(count);
        row.appendChild(percentEl);

        const bar = document.createElement('div');
        bar.className = 'bar';
        const fill = document.createElement('div');
        fill.className = 'bar-fill';
        fill.style.width = percent + '%';
        bar.appendChild(fill);

        result.appendChild(row);
        result.appendChild(bar);

        item.appendChild(text);
        item.appendChild(result);
        item.appendChild(voteBtn);

        voteListEl.appendChild(item);
      });

      if (state.hasVoted) {
        statusTag.textContent = '您已完成投票（同一投票仅可投一次）';
        statusTag.classList.remove('hidden');
      } else {
        statusTag.classList.add('hidden');
      }
    }

    // 处理投票点击
    function handleVote(optionId) {
      const state = loadState();
      if (!state) return;
      if (state.hasVoted) return;

      const target = state.options.find(o => o.id === optionId);
      if (!target) return;

      target.votes += 1;
      state.hasVoted = true; // 防重复投票
      saveState(state);
      renderVoteArea(state);
    }

    // 开始投票：从创建表单生成状态并进入投票界面
    function beginVoting() {
      const { title, texts, errors } = collectCreationData();
      if (errors.length > 0) {
        creationNotice.textContent = '提示：' + errors.join('；');
        creationNotice.classList.remove('hidden');
        return;
      } else {
        creationNotice.classList.add('hidden');
      }

      const id = String(Date.now());
      const options = texts.map((t, idx) => ({ id: id + '_' + idx, text: t, votes: 0 }));
      const state = { id, title, options, hasVoted: false, createdAt: new Date().toISOString() };
      saveState(state);

      showVoteView();
      renderVoteArea(state);
    }

    // 重置投票：清空本地存储并回到创建界面
    function resetVoting() {
      const ok = confirm('确定要重置投票吗？将清空当前投票的所有数据。');
      if (!ok) return;
      clearState();

      // 清空创建表单
      titleInput.value = '';
      optionsGrid.innerHTML = '';
      ensureMinOptions(2);
      creationNotice.classList.add('hidden');

      showCreationView();
    }

    // 页初始化：根据是否存在投票状态决定显示哪个视图
    function initPage() {
      const state = loadState();
      if (state && state.title && Array.isArray(state.options) && state.options.length >= 2) {
        showVoteView();
        renderVoteArea(state);
      } else {
        showCreationView();
      }

      if (optionsGrid.children.length === 0) {
        ensureMinOptions(2);
      }
    }

    // 事件绑定
    addOptionBtn.addEventListener('click', () => {
      optionsGrid.appendChild(createOptionInput());
    });

    startBtn.addEventListener('click', beginVoting);
    resetBtn.addEventListener('click', resetVoting);
    resetBtn2.addEventListener('click', resetVoting);

    document.addEventListener('DOMContentLoaded', initPage);
  </script>
  </body>
</html>
