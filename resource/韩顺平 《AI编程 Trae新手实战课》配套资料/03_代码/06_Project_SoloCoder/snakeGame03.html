<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>原生贪吃蛇 SnakeGame03</title>
  <style>
    /* ==========================
       基础样式与布局
       ========================== */
    :root {
      --bg-plain: #f5f7fb;
      --ui-primary: #2a7cf6;
      --ui-text: #1a1a1a;
      --ui-muted: #6b7280;
      --snake-body: #22c55e;
      --snake-head: #16a34a;
      --food: #ef4444;
      --grid: rgba(0, 0, 0, 0.08);
      --panel: #ffffff;
      --panel-border: #e5e7eb;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: var(--ui-text);
      background: var(--bg-plain);
    }

    .app {
      max-width: 960px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--panel-border);
    }

    .title {
      font-size: 18px;
      font-weight: 600;
    }

    .stats {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .stat {
      display: inline-flex;
      gap: 8px;
      align-items: baseline;
      color: var(--ui-muted);
      font-size: 14px;
    }
    .stat strong { color: var(--ui-text); }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .select, .btn {
      appearance: none;
      border: 1px solid var(--panel-border);
      background: #fff;
      color: var(--ui-text);
      font-size: 14px;
      padding: 8px 10px;
      border-radius: 8px;
    }
    .btn.primary { background: var(--ui-primary); color: #fff; border-color: var(--ui-primary); }

    .boardWrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 300ms ease;
    }

    canvas#board {
      width: 600px; /* 30 x 20 的格子，单格 20px */
      height: 400px;
      image-rendering: pixelated;
      border-radius: 10px;
      border: 1px solid var(--panel-border);
      background: rgba(255,255,255,0.6);
      box-shadow: inset 0 0 30px rgba(0,0,0,0.06);
    }

    .overlay {
      position: absolute;
      inset: 20px;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: rgba(0,0,0,0.25);
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      z-index: 2;
    }
    .overlay.show { display: flex; }

    .hint {
      padding: 12px 16px;
      border-top: 1px solid var(--panel-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .hintText { color: var(--ui-muted); font-size: 14px; }

    /* 触控方向按钮（移动端优先） */
    .touchControls {
      display: grid;
      grid-template-columns: 48px 48px 48px;
      grid-template-rows: 48px 48px 48px;
      gap: 8px;
      align-items: center;
      justify-items: center;
    }
    .touchBtn {
      width: 48px; height: 48px;
      border-radius: 8px;
      border: 1px solid var(--panel-border);
      background: #fff;
      font-weight: 700;
      color: var(--ui-muted);
      user-select: none;
    }
    .touchBtn:active { transform: scale(0.98); }
    .touchControls .empty { visibility: hidden; }

    @media (max-width: 720px) {
      canvas#board { width: 90vw; height: calc(90vw * 2 / 3); }
    }

    /* ==========================
       背景主题样式
       ========================== */
    .theme-plain { background: linear-gradient(180deg, #f8fafc, #eef2ff); }

    .theme-chess { /* 棋盘格 */
      background: repeating-linear-gradient(45deg, #f8fafc 0 24px, #e2e8f0 24px 48px);
    }

    .theme-grid { /* 网格线 */
      background:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(180deg, #fafafa, #eef2ff);
    }

    .theme-gradient { /* 霓虹渐变 */
      background: radial-gradient(1200px 400px at 10% 10%, #dbeafe 0%, transparent 50%),
                  radial-gradient(800px 300px at 90% 90%, #fee2e2 0%, transparent 40%),
                  linear-gradient(180deg, #f8fafc, #f1f5f9);
    }

    .theme-stars { /* 星空效果 */
      background-color: #0b1223;
      background-image:
        radial-gradient(2px 2px at 10% 20%, rgba(255,255,255,0.9), rgba(255,255,255,0) 60%),
        radial-gradient(1.5px 1.5px at 30% 70%, rgba(255,255,255,0.7), rgba(255,255,255,0) 60%),
        radial-gradient(1.8px 1.8px at 80% 40%, rgba(255,255,255,0.8), rgba(255,255,255,0) 60%),
        radial-gradient(1px 1px at 50% 20%, rgba(255,255,255,0.6), rgba(255,255,255,0) 60%);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <div class="topbar">
        <div class="title">贪吃蛇 SnakeGame03</div>
        <div class="stats">
          <div class="stat">分数：<strong id="score">0</strong></div>
          <div class="stat">最高：<strong id="highScore">0</strong></div>
        </div>
        <div class="controls">
          <label>
            背景：
            <select id="themeSelect" class="select">
              <option value="plain">纯色</option>
              <option value="chess">棋盘</option>
              <option value="grid">网格</option>
              <option value="gradient">渐变</option>
              <option value="stars">星空</option>
            </select>
          </label>
          <label>
            难度：
            <select id="speedSelect" class="select">
              <option value="slow">慢</option>
              <option value="normal" selected>中</option>
              <option value="fast">快</option>
            </select>
          </label>
          <button id="startBtn" class="btn primary">开始</button>
          <button id="resetBtn" class="btn">重新开始</button>
        </div>
      </div>

      <div id="boardWrap" class="boardWrap theme-plain">
        <canvas id="board" width="600" height="400"></canvas>
        <div id="overlay" class="overlay">Game Over</div>
      </div>

      <div class="hint">
        <div class="hintText">
          键盘：方向键或 W/A/S/D 控制；开始/暂停按钮可切换运行；重新开始可重置。
        </div>
        <div class="touchControls" aria-label="触控方向">
          <button class="touchBtn empty" disabled></button>
          <button class="touchBtn" data-dir="up">↑</button>
          <button class="touchBtn empty" disabled></button>
          <button class="touchBtn" data-dir="left">←</button>
          <button class="touchBtn" data-dir="down">↓</button>
          <button class="touchBtn" data-dir="right">→</button>
          <button class="touchBtn empty" disabled></button>
          <button class="touchBtn empty" disabled></button>
          <button class="touchBtn empty" disabled></button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==========================
    // 贪吃蛇核心逻辑（纯原生 JS）
    // ==========================

    // 画布与栅格配置（每格 20px，尺寸 600x400 => 30x20）
    const cellSize = 20; // 单元格像素大小
    const cols = 30;     // 列数
    const rows = 20;     // 行数
    const width = cols * cellSize;
    const height = rows * cellSize;

    // 速度档位（毫秒/步）
    const speedMap = { slow: 160, normal: 120, fast: 80 };

    // 画布上下文
    const board = document.getElementById('board');
    const ctx = board.getContext('2d');

    // UI 元素引用
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('highScore');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const themeSelect = document.getElementById('themeSelect');
    const speedSelect = document.getElementById('speedSelect');
    const boardWrap = document.getElementById('boardWrap');
    const overlay = document.getElementById('overlay');

    // 游戏状态
    let snake = [];          // 蛇身坐标数组（头在末尾）
    let dir = { x: 1, y: 0 };// 当前方向（初始向右）
    let dirQueue = [];       // 方向输入队列（用于避免同帧反向）
    let food = { x: 0, y: 0 };
    let score = 0;
    let highScore = 0;
    let running = false;     // 是否正在运行
    let timerId = null;      // 主循环计时器 ID
    let stepMs = speedMap[speedSelect.value]; // 当前速度（毫秒/步）

    // 初始化入口
    init();

    function init() {
      // 设置初始高分
      const hs = Number(localStorage.getItem('snakeGame03.highScore')) || 0;
      highScore = hs;
      highScoreEl.textContent = String(highScore);

      // 绑定事件
      document.addEventListener('keydown', onKeyDown);
      startBtn.addEventListener('click', toggleStartPause);
      resetBtn.addEventListener('click', resetGame);
      themeSelect.addEventListener('change', onThemeChange);
      speedSelect.addEventListener('change', onSpeedChange);
      document.querySelectorAll('.touchBtn[data-dir]').forEach(btn => {
        btn.addEventListener('click', () => {
          const d = btn.getAttribute('data-dir');
          queueDirection(dirFromString(d));
        });
      });

      // 初始化游戏状态
      resetGame();
    }

    // 重置游戏（不自动开始）
    function resetGame() {
      stopLoop();
      running = false;
      overlay.classList.remove('show');

      // 初始蛇长 4，居中偏左，从左到右
      const startX = Math.floor(cols / 2) - 2;
      const startY = Math.floor(rows / 2);
      snake = [
        { x: startX, y: startY },
        { x: startX + 1, y: startY },
        { x: startX + 2, y: startY },
        { x: startX + 3, y: startY },
      ];
      dir = { x: 1, y: 0 };
      dirQueue = [];
      score = 0;
      updateScoreUI();
      spawnFood();
      clearAndDraw();
      startBtn.textContent = '开始';
    }

    // 开始/暂停切换
    function toggleStartPause() {
      if (running) {
        stopLoop();
        running = false;
        startBtn.textContent = '开始';
      } else {
        startLoop();
        running = true;
        startBtn.textContent = '暂停';
      }
    }

    // 启动主循环
    function startLoop() {
      stopLoop();
      timerId = setInterval(loopStep, stepMs);
    }

    // 停止主循环
    function stopLoop() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    // 每一步的更新逻辑
    function loopStep() {
      applyQueuedDirection();

      const head = snake[snake.length - 1];
      const newHead = { x: head.x + dir.x, y: head.y + dir.y };

      // 撞墙判定
      if (newHead.x < 0 || newHead.x >= cols || newHead.y < 0 || newHead.y >= rows) {
        return gameOver();
      }

      // 撞到自身判定
      for (let i = 0; i < snake.length; i++) {
        if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
          return gameOver();
        }
      }

      // 推进蛇头
      snake.push(newHead);

      // 吃到食物：加分并生成新食物；否则移除尾巴
      if (newHead.x === food.x && newHead.y === food.y) {
        score += 1;
        updateScoreUI();
        spawnFood();
      } else {
        snake.shift();
      }

      clearAndDraw();
    }

    // 生成食物（避开蛇身）
    function spawnFood() {
      while (true) {
        const x = Math.floor(Math.random() * cols);
        const y = Math.floor(Math.random() * rows);
        const conflict = snake.some(seg => seg.x === x && seg.y === y);
        if (!conflict) {
          food = { x, y };
          return;
        }
      }
    }

    // 将队列中的方向应用到当前方向（避免同帧 180° 反向）
    function applyQueuedDirection() {
      if (dirQueue.length === 0) return;
      const next = dirQueue.shift();
      // 检查是否与当前方向相反（禁止直接反向）
      if (next.x + dir.x === 0 && next.y + dir.y === 0) {
        return; // 忽略非法反向
      }
      dir = next;
    }

    // 入队方向输入（键盘或触控）
    function queueDirection(d) {
      const last = dirQueue.length ? dirQueue[dirQueue.length - 1] : dir;
      // 与“最后将被应用的方向”相反则忽略，避免抖动自杀
      if (d.x + last.x === 0 && d.y + last.y === 0) return;
      dirQueue.push(d);
    }

    // 键盘事件映射
    function onKeyDown(e) {
      const code = e.code;
      if (code === 'ArrowUp' || code === 'KeyW') queueDirection({ x: 0, y: -1 });
      else if (code === 'ArrowDown' || code === 'KeyS') queueDirection({ x: 0, y: 1 });
      else if (code === 'ArrowLeft' || code === 'KeyA') queueDirection({ x: -1, y: 0 });
      else if (code === 'ArrowRight' || code === 'KeyD') queueDirection({ x: 1, y: 0 });
    }

    // 触控按钮方向字符串转向量
    function dirFromString(s) {
      switch (s) {
        case 'up': return { x: 0, y: -1 };
        case 'down': return { x: 0, y: 1 };
        case 'left': return { x: -1, y: 0 };
        case 'right': return { x: 1, y: 0 };
        default: return dir;
      }
    }

    // 根据主题选择变化切换背景类
    function onThemeChange() {
      boardWrap.classList.remove('theme-plain','theme-chess','theme-grid','theme-gradient','theme-stars');
      const v = themeSelect.value;
      boardWrap.classList.add('theme-' + v);
    }

    // 速度切换（运行中也可调整）
    function onSpeedChange() {
      stepMs = speedMap[speedSelect.value];
      if (running) startLoop();
    }

    // 结束游戏
    function gameOver() {
      stopLoop();
      running = false;
      overlay.textContent = `Game Over · 得分 ${score}`;
      overlay.classList.add('show');
      startBtn.textContent = '开始';
      // 写入最高分
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeGame03.highScore', String(highScore));
        updateScoreUI();
      }
    }

    // 更新分数显示
    function updateScoreUI() {
      scoreEl.textContent = String(score);
      highScoreEl.textContent = String(highScore);
    }

    // 清屏并绘制网格/蛇/食物
    function clearAndDraw() {
      // 清理画布
      ctx.clearRect(0, 0, width, height);

      // 轻微网格（提升空间感，可按需注释关闭）
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= width; x += cellSize) {
        ctx.beginPath();
        ctx.moveTo(x + 0.5, 0);
        ctx.lineTo(x + 0.5, height);
        ctx.stroke();
      }
      for (let y = 0; y <= height; y += cellSize) {
        ctx.beginPath();
        ctx.moveTo(0, y + 0.5);
        ctx.lineTo(width, y + 0.5);
        ctx.stroke();
      }

      // 绘制食物
      drawCell(food.x, food.y, '#fff');
      drawCell(food.x, food.y, getColorWithAlpha(getComputedStyleValue('--food'), 1));

      // 绘制蛇身与蛇头
      for (let i = 0; i < snake.length; i++) {
        const seg = snake[i];
        const isHead = i === snake.length - 1;
        const color = isHead ? getComputedStyleValue('--snake-head') : getComputedStyleValue('--snake-body');
        drawCell(seg.x, seg.y, color);
      }
    }

    // 绘制一个格子的填充矩形（对齐像素以避免模糊）
    function drawCell(gx, gy, color) {
      ctx.fillStyle = color;
      ctx.fillRect(gx * cellSize, gy * cellSize, cellSize, cellSize);
    }

    // 从 CSS 变量取色值
    function getComputedStyleValue(varName) {
      return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    }

    // 为颜色添加透明度（若需要）
    function getColorWithAlpha(color, alpha) {
      // 简化：直接返回原色或构造 rgba（此项目仅简单使用）
      if (color.startsWith('#')) {
        // 将 #rrggbb 转为 rgba
        const r = parseInt(color.slice(1,3), 16);
        const g = parseInt(color.slice(3,5), 16);
        const b = parseInt(color.slice(5,7), 16);
        return `rgba(${r},${g},${b},${alpha})`;
      }
      return color; // 已是 rgba 或其它格式
    }
  </script>
</body>
</html>
