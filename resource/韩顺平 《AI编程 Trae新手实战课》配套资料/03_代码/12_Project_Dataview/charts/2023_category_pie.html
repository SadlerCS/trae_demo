<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2023年各类商品销售数量占比</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
  html, body { height: 100%; margin: 0; }
  #chart { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="chart"></div>
<script>
  const data = [
    { name: "运动户外", value: 210 },
    { name: "电子产品", value: 155 },
    { name: "家居家装", value: 151 },
    { name: "汽车用品", value: 86 },
    { name: "电脑与办公", value: 71 },
    { name: "家用电器", value: 58 },
    { name: "美妆个护", value: 53 },
    { name: "手机与配件", value: 43 },
    { name: "服饰鞋包", value: 43 },
    { name: "食品饮料", value: 15 }
  ];
  const chart = echarts.init(document.getElementById('chart'));
  const option = {
    title: { text: "2023年各类商品销售数量占比", left: "center" },
    tooltip: { trigger: "item", formatter: "{b}<br/>销售数量: {c}<br/>占比: {d}%" },
    legend: { orient: "vertical", left: "left" },
    series: [
      {
        name: "销售数量",
        type: "pie",
        radius: "60%",
        center: ["50%", "55%"],
        data: data,
        emphasis: { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: "rgba(0, 0, 0, 0.5)" } }
      }
    ]
  };
  chart.setOption(option);
</script>
</body>
</html>
