<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>智能文本助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <h1>智能文本助手</h1>
    <div class="row">
      <label>选中文本时显示悬浮按钮</label>
      <input type="checkbox" id="enableFloating">
    </div>
    <div class="row">
      <label>默认目标语言</label>
      <div class="lang-group">
        <button id="langZh" class="lang-toggle">中文</button>
        <button id="langEn" class="lang-toggle">英文</button>
      </div>
    </div>
    <div class="row">
      <span id="apiStatus">Kimi API：未配置</span>
    </div>
    <div class="row actions">
      <button id="openOptions">打开设置</button>
      <button id="openHelp">帮助</button>
      <button id="openFeedback">反馈</button>
    </div>
    <p class="tip">说明：选中页面上的文字即可使用翻译或朗读。</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
