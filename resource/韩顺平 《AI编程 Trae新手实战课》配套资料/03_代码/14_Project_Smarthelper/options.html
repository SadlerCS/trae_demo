<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>智能文本助手设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options">
    <h1>设置</h1>

    <section>
      <h2>Kimi API</h2>
      <label>API URL</label>
      <input id="apiUrl" placeholder="粘贴你的 Kimi API URL">
      <label>API Key</label>
      <input id="apiKey" placeholder="粘贴你的 Kimi API Key">
      <label>模型（可选）</label>
      <input id="apiModel" placeholder="如 moonshot-v1-32k">
      <div class="row">
        <button id="testSave">测试并保存</button>
        <span id="saveStatus">未测试</span>
      </div>
    </section>

    <section>
      <h2>默认行为</h2>
      <label>默认目标语言</label>
      <select id="defaultLang">
        <option value="zh">中文</option>
        <option value="en">英文</option>
      </select>
      <label>选中文本时显示悬浮按钮</label>
      <input type="checkbox" id="enableFloating">
    </section>

    <section>
      <h2>朗读偏好</h2>
      <label>默认声音（可留空）</label>
      <input id="ttsVoice" placeholder="如 Microsoft Huihui - Chinese (Simplified, PRC)">
      <label>默认语速</label>
      <input id="ttsRate" type="number" step="0.1" min="0.1" max="3" placeholder="1.0">
      <label>默认音量</label>
      <input id="ttsVolume" type="number" step="0.1" min="0" max="1" placeholder="1.0">
      <div class="row">
        <button id="savePrefs">保存</button>
        <span id="prefsStatus">未保存</span>
      </div>
    </section>
  </div>
  <script src="options.js"></script>
</body>
</html>
